<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkillMatch JS</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <h1>SkillMatch JS</h1>
        <p>Simulador de Compatibilidade</p>
    </header>

    <main>

        <section class="card candidato-card">
            <h2>Candidato</h2>

            <div id="dados-candidato"></div>

            <button id="btnCarregar">
                Analisar Compatibilidade
            </button>
        </section>

        <section>
            <h2>Vagas</h2>

            <div id="vagas-container"></div>
        </section>

        <section class="melhor-vaga">
            <h2>Melhor Compatibilidade</h2>

            <div id="melhor-vaga"></div>
        </section>

    </main>

    <script src="main.js"></script>

</body>

</html>
