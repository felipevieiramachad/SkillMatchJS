<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>SkillMatch Web - Compatibilidade de Vagas</title>

    <meta name="description" content="Sistema para análise de compatibilidade entre candidatos e vagas de emprego.">

    <link rel="stylesheet" href="./assets/styles/style.css">

</head>

<body>

    <header>

        <div class="logo">

            <img src="./assets/img/logo.svg" alt="Logo SkillMatch">

            <h1>SkillMatch</h1>

        </div>

    </header>

    <main>

        <section class="perfil">

            <h2>Perfil do candidato</h2>

            <form id="formPerfil">

                <div class="campo">

                    <label for="nome">

                        Nome

                    </label>

                    <input type="text" id="nome" required>

                </div>

                <div class="campo">

                    <label for="area">

                        Área

                    </label>

                    <select id="area" required>

                        <option value="">Selecione</option>

                        <option>Front-end</option>

                        <option>Back-end</option>

                        <option>Full Stack</option>

                    </select>

                </div>

                <div class="campo">

                    <label for="habilidades">

                        Habilidades (separadas por vírgula)</label>

                    <input type="text" id="habilidades" required>

                </div>

                <div class="campo">

                    <label for="experiencia">

                        Experiência (meses)

                    </label>

                    <input type="number" id="experiencia" min="0" required>

                </div>

                <button type="submit">

                    Analisar Compatibilidade

                </button>

            </form>

        </section>

        <section class="mensagem">

            <p id="status" aria-live="polite">

            </p>

        </section>

        <section>

            <h2>Vagas Encontradas</h2>

            <div id="resultado"></div>

        </section>

    </main>

    <footer>

        <p>

            SkillMatch © 2026

        </p>

    </footer>

    <script type="module" src="./assets/scripts/main.js">

    </script>

</body>

</html>
